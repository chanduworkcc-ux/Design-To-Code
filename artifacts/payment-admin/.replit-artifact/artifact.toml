kind = "web"
previewPath = "/"
title = "Payment Gateway Settings"
version = "1.0.0"
id = "artifacts/payment-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22335

[services.development]
run = "pnpm --filter @workspace/payment-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/payment-admin", "run", "build" ]
publicDir = "artifacts/payment-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22335"
BASE_PATH = "/"
