kind = "web"
previewPath = "/"
title = "SecureShop E-Commerce Platform"
version = "1.0.0"
id = "artifacts/ecommerce-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20117

[services.development]
run = "pnpm --filter @workspace/ecommerce-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecommerce-platform", "run", "build" ]
publicDir = "artifacts/ecommerce-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20117"
BASE_PATH = "/"
